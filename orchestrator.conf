# ═══════════════════════════════════════════════════════════
# RHEL UPDATE ORCHESTRATOR - orchestrator.conf
# ═══════════════════════════════════════════════════════════
# Wersja projektu: 11.11
# Ostatnia zmiana: 2026-03-21
# Autor:           Krzysztof Boroń
# Opis:            Konfiguracja globalna orkiestratora
# ═══════════════════════════════════════════════════════════
# Ten plik definiuje globalne parametry dla całego systemu
# aktualizacji zdalnej. Używany przez:
#   - orchestrator.sh (główny skrypt)
#   - init-server.sh (inicjalizacja serwerów)
#   - update-worker.sh (pośrednio, przez zmienne środowiskowe)
#
# Aby użyć niestandardowej konfiguracji:
#   ./orchestrator.sh --config /path/to/custom.conf [opcje]
#   ./init-server.sh --config /path/to/custom.conf [serwery]
# ═══════════════════════════════════════════════════════════

# ─── KATALOGI BAZOWE ────────────────────────────────────────

# Katalog bazowy na serwerze kontrolnym (ten serwer)
# Tu znajdują się wszystkie skrypty, konfiguracje i logi centralne
CONTROL_BASE_DIR="/opt/auto_update_DUIT-AS-DB"

# Katalog bazowy na serwerach docelowych (zdalne serwery)
# Tu będą kopiowane skrypty i konfiguracje, tworzone logi lokalne
REMOTE_BASE_DIR="/opt/remote_updates_DUIT-AS-DB"

# ─── KONFIGURACJA SUDO ──────────────────────────────────────

# Nazwa pliku w /etc/sudoers.d/ na serwerach zdalnych
# Pełna ścieżka: /etc/sudoers.d/${SUDOERS_FILE}
SUDOERS_FILE="duit-as-db_auto_update"

# ─── DOMYŚLNE WARTOŚCI ──────────────────────────────────────

# Domyślny timeout wykonania skryptu (minuty, 0 = bez limitu)
# Może być nadpisany w pliku konfiguracyjnym per-serwer
DEFAULT_TIMEOUT=60

# Domyślny tryb wykonania
# Wartości: "sequential" (sekwencyjnie) lub "parallel" (równolegle)
DEFAULT_MODE="sequential"

# Domyślna liczba równoległych wykonań (gdy mode=parallel)
# Może być nadpisana argumentem --parallel N
DEFAULT_PARALLEL=1

# ─── SSH ────────────────────────────────────────────────────

# Domyślny użytkownik SSH (może być nadpisany w config per-serwer)
DEFAULT_SSH_USER="KB_USER_TEMP"

# Domyślny port SSH (może być nadpisany w config per-serwer)
DEFAULT_SSH_PORT=22

# Timeout połączenia SSH (sekundy)
SSH_CONNECT_TIMEOUT=10

# Opcje SSH (dodatkowe flagi dla wszystkich połączeń)
SSH_OPTIONS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR"

# ─── LOGOWANIE ──────────────────────────────────────────────

# Format znacznika czasu w nazwach plików logów
# Format: YYYY-MM-DD_HH-MM
LOG_TIMESTAMP_FORMAT="+%Y-%m-%d_%H-%M"

# Katalog główny logów (relatywny do CONTROL_BASE_DIR)
LOGS_DIR="logs"

# Rotacja logów - usuń logi starsze niż (dni, 0 = wyłączone)
LOG_RETENTION_DAYS=90

# ─── EMAIL (do implementacji później) ──────────────────────

# Plik konfiguracyjny SMTP (relatywny do CONTROL_BASE_DIR)
SMTP_CONFIG_FILE="email/smtp.conf"

# Włącz powiadomienia email (true/false)
EMAIL_ENABLED=false

# ─── ZAAWANSOWANE ───────────────────────────────────────────

# Maksymalna liczba prób retry przy błędzie SSH
MAX_SSH_RETRIES=3

# Czas oczekiwania między próbami retry (sekundy)
RETRY_DELAY=5

# Tryb verbose dla debugowania (true/false)
VERBOSE=false

# Kolory w logach (true/false)
USE_COLORS=true
