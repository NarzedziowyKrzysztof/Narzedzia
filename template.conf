# INSTRUKCJA:
# 1. Skopiuj ten plik: cp config/template.conf config/HOSTNAME.conf
# 2. Zastąp HOSTNAME rzeczywistą nazwą serwera (hostname -f)
# 3. Dostosuj wszystkie sekcje do specyfiki serwera
# 4. Dodaj nazwę serwera do servers.txt (opcjonalnie)
# 5. Uruchom: ./init-server.sh HOSTNAME (raz, przed pierwszym użyciem)
# 6. Uruchom: ./orchestrator.sh HOSTNAME
# ═══════════════════════════════════════════════════════════

# ─── POŁĄCZENIE SSH ─────────────────────────────────────────

# Użytkownik SSH do logowania na serwer
# MUSI mieć skonfigurowane:
#   - klucze SSH bez hasła
#   - sudo NOPASSWD dla update-worker.sh
SSH_USER="KB_USER_TEMP"

# Port SSH (opcjonalnie, domyślnie 22)
SSH_PORT=22

# ─── TIMEOUT ────────────────────────────────────────────────

# Maksymalny czas wykonania skryptu (minuty, 0 = bez limitu)
# Po przekroczeniu skrypt zostanie zabity i oznaczony jako FAIL
TIMEOUT_MINUTES=60

# ─── HARMONOGRAM ────────────────────────────────────────────

# Dzień tygodnia w którym ma się wykonywać aktualizacja
# Wartości: Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday
# Wielkość liter nie ma znaczenia
ALLOWED_DAY="Saturday"

# ─── ORACLE DATABASE ────────────────────────────────────────
# Usuń całą sekcję lub zostaw puste tablice jeśli brak Oracle

# Użytkownik systemowy Oracle (wspólny dla wszystkich instancji)
ORACLE_USER="oracle"

# Tablica instancji Oracle
# Format każdego wpisu: "SID:LISTENER:ORACLE_HOME"
# Przykłady:
#   "BAZA:LISTENER_BAZA:/app/oracle/19.3.0.0"
#   "PROD:LISTENER_PROD:/app/oracle/19.3.0.0"
#   "TEST:LISTENER_TEST:/app/oracle/21.0.0.0"
#
# Pusta tablica jeśli brak Oracle:
#   ORACLE_INSTANCES=()

ORACLE_INSTANCES=(
    # "BAZA:LISTENER_BAZA:/app/oracle/19.3.0.0"
    # "BAZA2:LISTENER_BAZA2:/app/oracle/19.3.0.0"
)

# ─── USŁUGI SYSTEMOWE (systemd) ────────────────────────────
# Usuń całą sekcję lub zostaw pustą tablicę jeśli brak usług

# Tablica usług systemd do zatrzymania
# Format: "nazwa_usługi" (bez .service)
# Przykłady:
#   "httpd"
#   "nginx"
#   "tomcat"
#   "application-server"
#
# Pusta tablica jeśli brak:
#   SYSTEMD_SERVICES=()

SYSTEMD_SERVICES=(
    # "usługaNr1"
    # "usługaNr2"
)

# ─── APLIKACJE Z WŁASNYM SKRYPTEM STOP ─────────────────────
# Usuń całą sekcję lub zostaw pustą tablicę jeśli brak aplikacji

# Tablica aplikacji z własnymi skryptami zatrzymania
# Format: "ścieżka_do_skryptu:użytkownik:argumenty"
# - ścieżka_do_skryptu: pełna ścieżka do pliku wykonywalnego (obowiązkowe)
# - użytkownik: "root" lub nazwa użytkownika systemowego (obowiązkowe)
# - argumenty: argumenty przekazane do skryptu (opcjonalne, domyślnie puste)
#
# Przykłady:
#   "/app/myapp/control:root:stop"
#   "/opt/tomcat/bin/shutdown.sh:tomcat:"
#   "/app/agent/control:appuser:stop all"
#   "/opt/app/script.sh:user:stop agent dwa"
#
# Wykonanie:
#   "/app/myapp/control:root:stop"
#   → /app/myapp/control stop
#
#   "/app/agent/control:appuser:stop all"
#   → su - appuser -c "/app/agent/control stop all"
#
#   "/opt/tomcat/bin/shutdown.sh:tomcat:"
#   → su - tomcat -c "/opt/tomcat/bin/shutdown.sh"
#
# Pusta tablica jeśli brak:
#   CUSTOM_APPS=()

CUSTOM_APPS=(
    # "/app/sciezka/aplikacja/APP1:root:stop"
    # "/app/sciezka/aplikacja/APP2:INNYUSER:stop all"
)

# ─── PAKIETY DNF - KRYTYCZNE ───────────────────────────────

# Pakiety które WYMAGAJĄ zatrzymania usług przed aktualizacją
# Używany mechanizm: grep -E (regex patterns)
# Jeśli KTÓRYKOLWIEK z tych pakietów pojawi się w dnf check-update,
# to wszystkie usługi i aplikacje zostaną zatrzymane przed aktualizacją.
#
# Przykłady:
#   "glibc"       - dopasuje: glibc, glibc-common, glibc-devel
#   "openssl"     - dopasuje: openssl, openssl-libs, openssl-devel
#   "^kernel$"    - dopasuje: TYLKO dokładnie "kernel" (nie kernel-core)
#
# WAŻNE: To są wzorce regex, nie wildcards DNF!

CRITICAL_PACKAGES=(
    "glibc"               # Biblioteka C
    "openssl"             # Biblioteka SSL/TLS
    "systemd"             # Init system i manager usług
    "httpd"               # Apache HTTP Server
    "nginx"               # Nginx web server
    "tomcat"              # Tomcat application server
    "java"                # Java Runtime Environment
    "python3"             # Python 3 runtime (UWAGA: dopasuje python3-*)
    "postgresql"          # PostgreSQL database
    "mariadb"             # MariaDB database
    "mysql"               # MySQL database
    "libssl"              # Biblioteki OpenSSL
    "libc"                # Biblioteka C (wariant)
    "nss"                 # Network Security Services
)

# ─── PAKIETY DNF - POMIJANE ────────────────────────────────

# Pakiety które będą CAŁKOWICIE POMINIĘTE podczas aktualizacji
# Używany mechanizm: DNF --exclude (wildcards DNF)
# Te pakiety nie będą aktualizowane nawet jeśli dostępna jest nowsza wersja.
#
# Przykłady:
#   "kernel*"           - pomiń wszystkie pakiety kernela
#   "python3-pip"       - pomiń dokładnie ten pakiet
#   "custom-app-*"      - pomiń wszystkie pakiety custom-app-*
#
# WAŻNE: To są wildcards DNF, nie regex!
# Pusta tablica = wszystkie pakiety będą aktualizowane:
#   SKIPPED_PACKAGES=()

SKIPPED_PACKAGES=(
    # "kernel*"
    # "python3-pip"
)

# ─── REPOZYTORIA DNF ────────────────────────────────────────

# Dodatkowe repozytoria do włączenia podczas aktualizacji
# Format: string oddzielony przecinkami lub "*" dla wszystkich
# 
# Przykłady:
#   ENABLE_REPOS="epel"                    # jedno repo
#   ENABLE_REPOS="epel,custom-repo"        # wiele repo
#   ENABLE_REPOS="*"                       # wszystkie repo
#   ENABLE_REPOS=""                        # brak (domyślnie)
#
# Każde repo przekazywane jako --enablerepo=nazwa do dnf

ENABLE_REPOS=""

# ─── WYMAGANIA DYSKOWE ──────────────────────────────────────

# Minimalna ilość wolnego miejsca na partycji / (GB)
# Aktualizacja nie zostanie rozpoczęta jeśli mniej niż ta wartość
ROOT_MIN_GB=1

# Minimalna ilość wolnego miejsca na partycji /var (GB)
# Aktualizacja nie zostanie rozpoczęta jeśli mniej niż ta wartość
VAR_MIN_GB=2

# ─── RESTART PO AKTUALIZACJI ───────────────────────────────

# Warunki restartu po pomyślnej aktualizacji
# Dostępne tryby:
#
#   "never"    - Nigdy nie restartuj automatycznie (domyślnie)
#                Użyj gdy restart serwera jest planowany osobno
#                lub gdy serwer nie może być restartowany automatycznie
#
#   "critical" - Restart tylko gdy zaktualizowano pakiety krytyczne
#                (te z tablicy CRITICAL_PACKAGES)
#                Użyj gdy restart ma być wykonany tylko przy istotnych zmianach
#                systemowych (glibc, openssl, systemd, kernel, itp.)
#
#   "always"   - Restart zawsze gdy JAKIEKOLWIEK pakiety zostały zaktualizowane
#                Użyj gdy serwer powinien być restartowany po każdej aktualizacji
#                (np. serwery produkcyjne wymagające czystego stanu)
#
# WARUNKI WYKONANIA RESTARTU (wszystkie muszą być spełnione):
#   ✓ Aktualizacja DNF zakończona sukcesem (kod wyjścia 0)
#   ✓ Były pakiety do aktualizacji (TOTAL_PACKAGES > 0)
#   ✓ Tryb NIE jest dry-run
#   ✓ AUTO_REBOOT_AFTER_UPDATE != "never"
#   ✓ Spełniony warunek trybu (critical lub always)
#
# Przykłady użycia:
#   AUTO_REBOOT_AFTER_UPDATE="never"     # Brak auto-restartu
#   AUTO_REBOOT_AFTER_UPDATE="critical"  # Restart gdy glibc, openssl, systemd itp.
#   AUTO_REBOOT_AFTER_UPDATE="always"    # Restart przy każdej aktualizacji

AUTO_REBOOT_AFTER_UPDATE="never"

# Opóźnienie przed restartem (minuty)
# Czas na zakończenie połączenia SSH, zapisanie logów i posprzątanie
# Wartość przekazywana do: shutdown -r +N
# Minimalnie: 1 minuta (zalecane)
# Domyślnie: 1 minuta

REBOOT_DELAY_MINUTES=1

# ─── ZATRZYMYWANIE USŁUG ───────────────────────────────────

# Strategia zatrzymywania usług, aplikacji i baz danych
# Dostępne tryby:
#
#   "auto"   - Zatrzymuj usługi TYLKO gdy restart będzie wykonany (domyślnie)
#              Logika: po co zatrzymywać, skoro nie ma restartu?
#              • AUTO_REBOOT=never     → NIE zatrzymuj usług
#              • AUTO_REBOOT=critical  → zatrzymuj gdy critical packages
#              • AUTO_REBOOT=always    → zatrzymuj zawsze
#              Użyj gdy: chcesz inteligentnego zachowania (zero downtime bez restartu)
#
#   "always" - ZAWSZE zatrzymuj usługi przy critical packages (nawet bez restartu)
#              Użyj gdy: administrator chce manualnie zrestartować po sprawdzeniu
#              Scenariusz: pakiety zainstalowane, usługi zatrzymane, czekam na Twój restart
#
#   "never"  - NIGDY nie zatrzymuj usług (nawet przy restarcie)
#              Użyj gdy: potrzebujesz zero downtime (usługi działają do końca)
#              Scenariusz: load balancer, jeden z nodów w klastrze
#
# Przykłady kombinacji:
#   STOP_SERVICES_MODE="auto"   + AUTO_REBOOT="never"    → zero downtime, brak zatrzymywania
#   STOP_SERVICES_MODE="always" + AUTO_REBOOT="never"    → przygotuj do restartu, ale czekaj
#   STOP_SERVICES_MODE="auto"   + AUTO_REBOOT="critical" → zatrzymuj i restartuj przy critical
#   STOP_SERVICES_MODE="never"  + AUTO_REBOOT="always"   → restart bez zatrzymywania usług

STOP_SERVICES_MODE="auto"

